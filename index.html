<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FoodSpot Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Leaflet Map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body {
    background:#0f172a;
    color:white;
    transition:0.3s;
}

.light {
    background:#f1f5f9;
    color:black;
}

.container {
    text-align:center;
    padding:30px;
}

h1 { font-size:38px; }

.top-bar {
    display:flex;
    justify-content:center;
    gap:10px;
    margin:20px;
    flex-wrap:wrap;
}

input, select {
    padding:12px;
    border-radius:8px;
    border:none;
}

button {
    padding:12px 18px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

button:hover { background:#16a34a; }

#map {
    height:300px;
    margin:20px auto;
    border-radius:15px;
    max-width:900px;
}

#results {
    display:grid;
    gap:15px;
    max-width:900px;
    margin:auto;
}

.card {
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    text-align:left;
}

.light .card {
    background:white;
}

.favorite {
    float:right;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>🍽️ FoodSpot Pro</h1>

<div class="top-bar">
    <input id="searchInput" placeholder="City / State / Pincode">
    <select id="category">
        <option value="restaurant">All</option>
        <option value="catering.restaurant">Restaurant</option>
        <option value="catering.cafe">Cafe</option>
        <option value="catering.fast_food">Fast Food</option>
    </select>

    <button onclick="searchPlaces()">Search</button>
    <button onclick="getLocation()">📍 Near Me</button>
    <button onclick="toggleTheme()">🌙 Toggle</button>
</div>

<div id="map"></div>

<div id="results"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const API_KEY = "6d723ee6434f4004baa52ff6b26a1702";

let map = L.map('map').setView([20.5937, 78.9629], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

let markers = [];

// THEME
function toggleTheme() {
    document.body.classList.toggle("light");
}

// FAVORITES
function toggleFav(name) {
    let favs = JSON.parse(localStorage.getItem("favs") || "[]");

    if (favs.includes(name)) {
        favs = favs.filter(f => f !== name);
    } else {
        favs.push(name);
    }

    localStorage.setItem("favs", JSON.stringify(favs));
    alert("Updated favorites");
}

// LOCATION
function getLocation() {
    navigator.geolocation.getCurrentPosition(pos => {
        fetchPlaces(pos.coords.latitude, pos.coords.longitude);
    });
}

// SEARCH
async function searchPlaces() {
    const query = document.getElementById("searchInput").value.trim();

    if (!query) return alert("Enter location");

    const geo = await fetch(`https://api.geoapify.com/v1/geocode/search?text=${query}&apiKey=${API_KEY}`);
    const geoData = await geo.json();

    if (!geoData.features.length) return alert("Location not found");

    const { lat, lon } = geoData.features[0].properties;

    fetchPlaces(lat, lon);
}

// FETCH PLACES
async function fetchPlaces(lat, lon) {
    const results = document.getElementById("results");
    const category = document.getElementById("category").value;

    results.innerHTML = "Loading...";
    
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    map.setView([lat, lon], 13);

    const res = await fetch(`https://api.geoapify.com/v2/places?categories=${category}&filter=circle:${lon},${lat},5000&limit=15&apiKey=${API_KEY}`);
    const data = await res.json();

    results.innerHTML = "";

    data.features.forEach(place => {
        const p = place.properties;

        // MAP MARKER
        const marker = L.marker([p.lat, p.lon]).addTo(map)
            .bindPopup(p.name || "Restaurant");

        markers.push(marker);

        // RANDOM RATING (UI ONLY)
        const rating = (Math.random()*2+3).toFixed(1);

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <span class="favorite" onclick="toggleFav('${p.name}')">❤️</span>
            <h3>${p.name || "Unnamed"}</h3>
            <p>📍 ${p.address_line2 || "No address"}</p>
            <p>⭐ ${rating} / 5</p>
        `;

        results.appendChild(div);
    });
}
</script>

</body>
</html>
